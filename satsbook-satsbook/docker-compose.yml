version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: satsbook-satsbook_server_1
      APP_PORT: 3000

  server:
    image: ghcr.io/satsbook/satsbook:0.0.0-test1
    container_name: satsbook-satsbook_server_1
    restart: on-failure
    stop_grace_period: 1m
    init: true
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - ${APP_LIGHTNING_NODE_DATA_DIR}:/lnd:ro
    environment:
      SATSBOOK_LND_HOST: ${APP_LIGHTNING_NODE_IP}
      SATSBOOK_LND_PORT: ${APP_LIGHTNING_NODE_GRPC_PORT}
      SATSBOOK_LND_MACAROON_PATH: /lnd/data/chain/bitcoin/mainnet/readonly.macaroon
      SATSBOOK_LND_TLS_CERT_PATH: /lnd/tls.cert
      SATSBOOK_DATABASE_PATH: /data/satsbook.db
      SATSBOOK_APP_PORT: 3000
      SATSBOOK_LOG_LEVEL: info
    networks:
      default:
        ipv4_address: ${APP_SATSBOOK_SATSBOOK_IP}
